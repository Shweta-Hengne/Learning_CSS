<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Example of class selector -->
    <style>
        .heading1{
            color:blue;
            background-color: yellow;
        }
        .heading2{
            color:red;
            background-color: black;
        }
        .para{
            color:white;
            background-color: red;
        }
        #head1{
            color:yellow;
            background-color: blue;
        }
        .head2{
            color: blue;
            background-color: palevioletred;
            font-size: 50px;
        }
        .head_index{
            color:blueviolet;
        }
        #head_about{
            color:red;
        }
    </style>
</head>
<body>
    <h5 class="head_index">Good morning</h5>
    <h5 id="head_about">Good morning Everyone</h5>
    <h4 class="head2" id="head2">Hello shruti</h4>
    <h3 id="head1">Welcome to Pune</h3>
    <h1 class="heading1">Hello welcome shweta</h1>
    <h1 class="heading2">Hello it's soham</h1>
    <p class="para">welcome to city pune,here we explore all the interesting places here</p>
</body>
</html>
