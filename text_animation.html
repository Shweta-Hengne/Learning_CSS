<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .text-container {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            letter-spacing: 4px;
            font-size: 60px;
            font-weight: 800;
            perspective: 80px;
        }
        .text-container > b {
            box-shadow: 0px 20px 10px grey;
            background: linear-gradient(to right, pink, yellow, green);
            background-clip: text;
            color: transparent;
            transform-origin: bottom;
            transform: rotateX(-85deg);
            animation: getUpDown 10s infinite;
        }

        .text-container>b:nth-child(1){
            animation-delay: 0s;
        }
        .text-container>b:nth-child(2){
            animation-delay: 0.20s;
        }
        .text-container>b:nth-child(3){
            animation-delay: 0.40s;
        }
        .text-container>b:nth-child(4){
            animation-delay: 0.60s;
        }
        .text-container>b:nth-child(5){
            animation-delay: 0.80;
        }
        .text-container>b:nth-child(6){
            animation-delay: 1s;
        }

        @keyframes getUpDown{
            from {transform: rotateX(-85deg);}
            10%, 50%{transform: rotateX(0);}
            60%, to {transform: rotateX(-85deg);}
        } 



    </style>
</head>

<body>
    <div class="text-container">
        <b>S</b><b>H</b><b>W</b><b>E</b><b>T</b><b>A</b>
    </div>
</body>

</html>
