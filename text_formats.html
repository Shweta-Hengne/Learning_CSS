<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .t_transform_upper{
            text-transform:uppercase;
        }
        .t_transform_lower{
            text-transform:lowercase;
        }
        .t_transform_capitalize{
            text-transform:capitalize;
        }
        .t_center{
            text-align: center;
        }
        .t_right{
            text-align: right;
        }
        .t_decor_underline{
            text-decoration: underline;
        }
        .t_decor_overline{
            text-decoration: overline;
        }
        .t_decor_line-through{
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <h1 class="t_decor_line-through">Shweta Hengne</h1>
    <h1 class="t_decor_underline">Shweta Hengne</h1>
    <h1 class="t_decor_overline">Shweta Hengne</h1>
    <h1 class="t_right">Shweta Hengne</h1>
    <h1 class="t_center">Shweta Hengne</h1>
    <h1 class="t_transform_upper t_center">Shweta hengne</h1>
    <h1 class="t_transform_lower">Shweta hengne</h1>
    <h1 class="t_transform_capitalize">Shweta hengne welcome to pune</h1>
    <p style="text-indent: 50px;">
        this is the Example of text indent
    </p>
</body>
</html>
